services:
  iatronix-db:
    ports:
      - "5433:5432"

  iatronix-backend:
    ports:
      - "8100:8000"
    volumes:
      - ./backend/app:/app/app
    environment:
      - LOG_LEVEL=DEBUG

  iatronix-frontend:
    ports:
      - "3100:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - NODE_ENV=development
