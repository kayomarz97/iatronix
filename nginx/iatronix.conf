# Iatronix — Nginx reverse proxy configuration
# Deployed on VPS behind Cloudflare (Cloudflare handles SSL termination)
# Nginx receives plain HTTP from Cloudflare and proxies to Docker containers
#
# ── HOW TO USE ──────────────────────────────────────────────────────────────
# 1. Replace YOUR_DOMAIN.COM with your actual domain (e.g. med.example.com)
# 2. Copy to system:
#      sudo cp iatronix.conf /etc/nginx/sites-available/iatronix
#      sudo ln -sf /etc/nginx/sites-available/iatronix /etc/nginx/sites-enabled/iatronix
#      sudo nginx -t && sudo nginx -s reload
# See DOMAIN_MIGRATION.md for full domain change instructions
# ────────────────────────────────────────────────────────────────────────────

# Rate limiting zones (applied before proxying)
limit_req_zone $binary_remote_addr zone=iatronix_general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=iatronix_api:10m     rate=60r/m;

# Upstream — Docker containers bound to localhost only
upstream iatronix_frontend {
    server 127.0.0.1:3200;
    keepalive 16;
}

upstream iatronix_backend {
    server 127.0.0.1:8200;
    keepalive 8;
}

# Gzip compression
gzip            on;
gzip_vary       on;
gzip_proxied    any;
gzip_comp_level 6;
gzip_types      text/plain text/css text/xml application/json
                application/javascript application/xml+rss
                application/atom+xml image/svg+xml;

server {
    listen 80;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Cloudflare real IP passthrough ────────────────────────────────────
    # Cloudflare IP ranges — tells nginx to trust CF-Connecting-IP header
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Backend API ───────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=iatronix_api burst=20 nodelay;

        proxy_pass         http://iatronix_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # LLM responses can take up to 90s on Sonnet — never timeout early
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;

        # Increase body size for PDF uploads (20MB max)
        client_max_body_size 25m;
    }

    # Health check — no rate limit, no logging
    location = /api/v1/health {
        proxy_pass http://iatronix_backend/api/v1/health;
        access_log off;
    }

    # ── Next.js static assets — cached aggressively ───────────────────────
    location /_next/static/ {
        proxy_pass http://iatronix_frontend;
        expires    1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Frontend (all other routes) ───────────────────────────────────────
    location / {
        limit_req zone=iatronix_general burst=10 nodelay;

        proxy_pass         http://iatronix_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (for Next.js HMR in dev)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 60s;
    }
}
